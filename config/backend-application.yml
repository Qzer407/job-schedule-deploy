server:
  port: 8080

spring:
  application:
    name: job-scheduler
  datasource:
    url: jdbc:mysql://localhost:3306/task_scheduler?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

xxl:
  job:
    admin:
      addresses: http://127.0.0.1:8081/xxl-job-admin
    executor:
      appname: job-scheduler-executor
      ip:
      port: 9999
      logpath: /tmp/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: default_token

logging:
  level:
    com.qzer.scheduler: DEBUG
    com.xxl.job: DEBUG
